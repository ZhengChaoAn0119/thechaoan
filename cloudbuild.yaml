substitutions:
  _CONTENT_BUCKET: thechaoan-md-bucket
  _REGION: asia-east1
  _SERVICE_NAME: thechaoan-blog
  _AR_HOST: asia-east1-docker.pkg.dev
  _REPO: my-repo
  _IMAGE_NAME: blog-frontend

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_RECAPTCHA_SITE_KEY/versions/latest
      env: NEXT_PUBLIC_RECAPTCHA_SITE_KEY

steps:
  - name: 'gcr.io/cloud-builders/gsutil'
    id: sync-posts
    args: ['-m', 'rsync', '-r', '-d',
           'gs://${_CONTENT_BUCKET}/posts/', 'content/posts/']

  - name: 'gcr.io/cloud-builders/gsutil'
    id: sync-images
    entrypoint: sh
    args:
      - '-c'
      - 'mkdir -p content/images && gsutil -m rsync -r -d gs://${_CONTENT_BUCKET}/images/ content/images/'

  - name: 'gcr.io/cloud-builders/docker'
    id: docker-build
    waitFor: ['sync-posts', 'sync-images']
    secretEnv: ['NEXT_PUBLIC_RECAPTCHA_SITE_KEY']
    args:
      - 'build'
      - '-t'
      - '${_AR_HOST}/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:$BUILD_ID'
      - '-t'
      - '${_AR_HOST}/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_RECAPTCHA_SITE_KEY=$$NEXT_PUBLIC_RECAPTCHA_SITE_KEY'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: docker-push
    waitFor: ['docker-build']
    args: ['push', '--all-tags',
           '${_AR_HOST}/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: cloud-run-deploy
    waitFor: ['docker-push']
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_AR_HOST}/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:$BUILD_ID'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--set-secrets'
      - 'FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,AUTH_SECRET=AUTH_SECRET:latest,AUTH_GOOGLE_ID=AUTH_GOOGLE_ID:latest,AUTH_GOOGLE_SECRET=AUTH_GOOGLE_SECRET:latest,RECAPTCHA_SECRET_KEY=RECAPTCHA_SECRET_KEY:latest'
      - '--quiet'

images:
  - '${_AR_HOST}/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:$BUILD_ID'
  - '${_AR_HOST}/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
